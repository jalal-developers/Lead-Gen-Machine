name: Nightly Lead Generation

# This tells GitHub to run this script automatically at midnight UTC every day.
# You can also click a button to run it manually (workflow_dispatch).
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  scrape-and-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install chromium

      - name: Run Lead-Gen Machine
        run: node run.js

      # This packages your Excel file and screenshots so you can download them!
      - name: Upload CRM and Screenshots
        uses: actions/upload-artifact@v4
        with:
          name: Daily-Leads-CRM
          path: |
            leads_crm.xlsx
            screenshots/